# 核心配置文件
# 合并了 AI 提供者、知识库、评分和热榜配置
# 版本: 2.0

# ====================== AI 提供者配置 ======================
ai_providers:
  providers:
    doubao:
      name: "豆包"
      base_url: "https://ark.cn-beijing.volces.com/api/v3"
      sdk: "volcengine"

    deepseek:
      name: "DeepSeek"
      base_url: "https://api.deepseek.com/v1"
      sdk: "openai"

    qwen:
      name: "通义千问"
      base_url: "https://dashscope.aliyuncs.com/compatible-mode/v1"
      sdk: "openai"

    openrouter:
      name: "OpenRouter"
      base_url: "https://openrouter.ai/api/v1"
      sdk: "openai"
      extra_headers:
        HTTP-Referer: "https://github.com/news-analyzer"
        X-Title: "News Analyzer"

    # ========== 扩展示例 ==========
    # 如需添加其他厂商，请参考以下格式：
    #
    # openai:
    #   name: "OpenAI"
    #   base_url: "https://api.openai.com/v1"
    #   sdk: "openai"
    #
    # custom_provider:
    #   name: "自定义厂商"
    #   base_url: "https://your-api-endpoint.com/v1"
    #   sdk: "openai"

# ====================== 知识库配置 ======================
knowledge:
  knowledge_base:
    type: chroma
    persist_dir: data/knowledge_base/chroma
    collection_name: news_articles
    embedding_dimension: 1024

  embedding:
    provider: local
    model: BAAI/bge-m3
    fast_model: all-MiniLM-L6-v2
    batch_size: 32
    max_length: 8192

  retrieval:
    top_k: 10
    min_score: 0.5
    time_decay_days: 30
    max_context_length: 4000
    enable_hybrid: false

  indexing:
    strategy: incremental
    chunk_size: 512
    chunk_overlap: 50
    content_max_length: 8000

  cleanup:
    retention_days: 90
    schedule: "0 3 * * *"

# ====================== AI 处理配置 ======================
ai_processing:
  batch_size: 4
  max_retry: 1
  timeout: 30

# ====================== 热榜配置 ======================
hotboard:
  api:
    base_url: "https://uapis.cn/api/v1/misc/hotboard"
    api_key: "${HOTBOARD_API_KEY}"  # 从环境变量读取
    timeout: 30
    retry_count: 3
    retry_delay: 1

  platforms:
    - name: weibo
      display_name: "新浪微博热搜"
      enabled: true
      max_items: 50
      
    - name: zhihu
      display_name: "知乎热榜"
      enabled: true
      max_items: 50
      
    - name: baidu
      display_name: "百度热搜"
      enabled: true
      max_items: 50
      
    - name: toutiao
      display_name: "今日头条热榜"
      enabled: true
      max_items: 50

  cache:
    ttl_hours: 6
    enabled: true

# ====================== 评分配置 ======================
scoring:
  # ── final_score 权重 ──────────────────────────────────
  # 四项评分加权求和后映射到 0-100 范围
  # 公式: (source×w1 + influence×w2 + value×w3 + heat×w4) / 10 × 100
  # 各项输入范围 0-10，输出范围 0-100
  weights:
    source: 0.25       # 信源权威性：基于 Tier 层级，反映信息来源的可信程度
    influence: 0.25    # 事件影响力：LLM 评估，衡量事件波及范围和社会影响
    value: 0.25        # 决策价值：LLM 评估，对投资/政策/技术决策的参考意义
    heat: 0.25         # 热榜热度：BGE-M3 向量匹配多平台热榜的共振程度

  # ── 信源 Tier 分值映射 ────────────────────────────────
  # sources.yaml 中定义的 tier 层级对应的权威性分数 (0-10)
  tier_scores:
    1: 9.5             # 核心骨架：路透社、美联社、法新社等顶级通讯社
    2: 7.5             # 区域支柱：BBC、纽约时报、金融时报等主流媒体
    3: 5.5             # 专业补充：TechCrunch、36氪等垂直领域媒体
  default_source_score: 5.0  # 未在 sources.yaml 中定义的信源默认分

  # ── 热度评分规则 ──────────────────────────────────────
  heat:
    similarity_threshold: 0.85  # BGE-M3 向量匹配阈值，低于此值不计入匹配
    score_rules:                # 按匹配平台数量映射分值 (0-10)
      0: 0                      # 无匹配 → 0 分
      1:                        # 单平台匹配，按相似度细分
        high_sim: 0.90          # 相似度 > 0.90 → 5 分
        high_score: 5
        low_score: 4            # 相似度 0.85-0.90 → 4 分
      2: 7                      # 2 个平台匹配 → 7 分
      3: 8                      # 3 个平台匹配 → 8 分
      4:                        # 4 个平台匹配，按平均相似度细分
        high_avg_sim: 0.92      # 平均相似度 > 0.92 → 10 分
        high_score: 10
        low_score: 9            # 平均相似度 ≤ 0.92 → 9 分

  # ── 默认值与阈值 ─────────────────────────────────────
  defaults:
    score: 5.0              # 各评分维度缺失时的默认值
    accuracy_pass: 0.6      # accuracy_score ≥ 此值视为校验通过
  lightweight_confidence: 0.7  # 轻量级分类置信度阈值，≥ 此值才填充 domain
