<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>取消订阅 - Insight Hub</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <nav class="navbar">
        <div class="nav-brand">
            <a href="/">Insight Hub</a>
        </div>
        <div class="nav-links">
            <a href="/">首页</a>
            <a href="/subscribe">订阅</a>
            <a href="/unsubscribe">取消订阅</a>
        </div>
    </nav>

    <main class="container">
        <section class="form-section">
            <h1>取消订阅</h1>
            
            {% with messages = get_flashed_messages(with_categories=true) %}
                {% if messages %}
                    {% for category, message in messages %}
                        <div class="alert alert-{{ category }}">
                            {{ message }}
                        </div>
                    {% endfor %}
                {% endif %}
            {% endwith %}

            <form method="POST" action="/unsubscribe" class="subscribe-form">
                <div class="form-group">
                    <label for="email">邮箱地址</label>
                    <input type="email" id="email" name="email" placeholder="请输入您的邮箱" required>
                </div>
                <button type="submit" class="btn btn-danger btn-block">取消订阅</button>
            </form>

            <div class="info-box">
                <p>取消订阅后，您将不再收到我们的新闻报告邮件。</p>
                <p>如果您改变主意，随时可以重新订阅。</p>
            </div>
        </section>
    </main>

    <footer>
        <div class="container">
            <p>&copy; 2026 Insight Hub. All rights reserved.</p>
        </div>
    </footer>
</body>
</html>
