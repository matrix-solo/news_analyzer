        sources: [BBC News, 纽约时报, 金融时报, 华尔街日报, 卫报, 华盛顿邮报, 半岛电视台, NHK World, 德国之声, 联合早报, 南华早报, 共同社, 韩联社, CNBC, 日经亚洲, 安莎社, 洛杉矶时报, 悉尼先驱晨报]
    
    tier3:
        description: 专业补充，科技、财经、国内市场化媒体
        weight: 5-6
        sources: [澎湃新闻, 第一财经, 财经杂志, TechCrunch, The Verge, Ars Technica, 印度时报, ZDNet, CNET, Wired, 钛媒体, 36氪]

# ============================================================
# 健康监控规则
# ============================================================

health_monitor_rules:
    - rule: 连续失败3次
      trigger: 采集返回非200或解析空内容
      action: 自动禁用，发邮件通知
    
    - rule: 连续成功2次
      trigger: 从禁用状态恢复
      action: 自动重新启用
    
    - rule: 空内容率>20%
      trigger: 最近7天统计
      action: 降级至监控状态，人工复核
    
    - rule: 5W1H完整率<30%
      trigger: AI抽取结果统计
      action: 人工检查源是否适合快讯定位
    
    - rule: 原创比例<70%
      trigger: 抽样分析结果
      action: 标记为监控状态，30天后复评
    
    - rule: 定期复核
      trigger: 每季度
      action: 按四维标准重新评估全部信源
