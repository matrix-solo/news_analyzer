# 信源管理配置文件 V4.0
# 优化原则：权威快讯为主，AI深度为辅
# 分层策略：Tier 1（核心骨架）→ Tier 2（区域支柱）→ Tier 3（专业补充）
# 采集策略：所有启用的信源每次采集必取

# ============================================================
# 四维筛选标准（信源评估框架）
# ============================================================
# 
# source_evaluation_criteria:
#     authority:
#         description: 权威性 - 媒体是否具备一手采访能力、事实核查机制、行业声誉
#         threshold: 至少满足2项
#     content_purity:
#         description: 内容来源纯净度 - 报道是否主要来自原创/一手采访
#         threshold: 原创比例≥70%
#     w5h1_completeness:
#         description: 5W1H完整性 - 报道是否以事实信息为核心
#         threshold: 5W1H完整率≥80%
#     update_stability:
#         description: 更新稳定性 - 是否持续产出符合标准的新闻
#         threshold: 更新天数≥20天/月，无效内容≤10%

# ============================================================
# 国际信源
