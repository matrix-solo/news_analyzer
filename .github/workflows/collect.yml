# 新闻采集（每天2次补充）+ 早上采集+报告
# 北京时间：早7点（采集+报告）、下午3点、晚11点
name: 新闻采集

on:
  schedule:
    - cron: '0 23 * * *'   # 北京时间早7点（UTC 23:00前一天）- 采集+报告
    - cron: '0 7 * * *'    # 北京时间下午3点（UTC 7:00）- 补充采集
    - cron: '0 15 * * *'   # 北京时间晚11点（UTC 15:00）- 补充采集
  workflow_dispatch:  # 支持手动触发

jobs:
  # 早7点：采集 + 生成报告（主任务）
  # 手动触发时也执行此任务
  collect-and-report:
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' || github.event.schedule == '0 23 * * *'
    timeout-minutes: 240
    steps:
      - uses: actions/checkout@v4

      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 恢复 pip 缓存
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ runner.os }}-py311-${{ hashFiles('requirements.txt') }}
          restore-keys: pip-${{ runner.os }}-py311-

      - name: 恢复数据缓存
        uses: actions/cache@v4
        with:
          path: data
          key: news-analyzer-data-v1
          restore-keys: news-analyzer-data-

      - name: 恢复 HuggingFace 模型缓存
        uses: actions/cache@v4
        with:
          path: ~/.cache/huggingface
          key: huggingface-models-${{ runner.os }}
          restore-keys: huggingface-models-

      - name: 安装中文字体
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq fonts-wqy-microhei fonts-noto-cjk-extra 2>/dev/null || true
          fc-cache -fv 2>/dev/null || true
          echo "字体安装完成"
          fc-list :lang=zh | head -5 || echo "未检测到中文字体"

      - name: 安装依赖
        run: pip install -r requirements.txt

      - name: 配置环境变量
        run: |
          cp .env.example .env
          # === CI 环境使用官方 HuggingFace（非中国镜像）===
          echo "HF_ENDPOINT=https://huggingface.co" >> .env
          # === 深度分析模型（非敏感信息直接写入）===
          echo "AI_ANALYSIS_PROVIDER=deepseek" >> .env
          echo "AI_ANALYSIS_MODEL=deepseek-reasoner" >> .env
          echo "AI_ANALYSIS_KEY=${{ secrets.AI_ANALYSIS_KEY }}" >> .env
          echo "AI_ANALYSIS_BASE_URL=https://api.deepseek.com/v1" >> .env
          # === 快速筛选模型（非敏感信息直接写入）===
          echo "AI_FILTER_PROVIDER=doubao" >> .env
          echo "AI_FILTER_MODEL=doubao-seed-2-0-mini-260215" >> .env
          echo "AI_FILTER_KEY=${{ secrets.AI_FILTER_KEY }}" >> .env
          echo "AI_FILTER_BASE_URL=https://ark.cn-beijing.volces.com/api/v3" >> .env
          # === 邮件配置 ===
          echo "SMTP_HOST=${{ secrets.SMTP_HOST }}" >> .env
          echo "SMTP_PORT=${{ secrets.SMTP_PORT }}" >> .env
          echo "SMTP_USER=${{ secrets.SMTP_USER }}" >> .env
          echo "SMTP_PASSWORD=${{ secrets.SMTP_PASSWORD }}" >> .env
          echo "EMAIL_TO=${{ secrets.EMAIL_TO }}" >> .env

      - name: 执行新闻采集
        run: python task1_collector.py

      - name: 生成报告并发送邮件
        run: python task2_reporter.py

      - name: 上传报告
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: daily-report
          path: reports/
          retention-days: 1

  # 下午3点、晚11点：补充采集
  collect:
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule' && (github.event.schedule == '0 7 * * *' || github.event.schedule == '0 15 * * *')
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4

      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 恢复 pip 缓存
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ runner.os }}-py311-${{ hashFiles('requirements.txt') }}
          restore-keys: pip-${{ runner.os }}-py311-

      - name: 恢复数据缓存
        uses: actions/cache@v4
        with:
          path: data
          key: news-analyzer-data-v1
          restore-keys: news-analyzer-data-

      - name: 恢复 HuggingFace 模型缓存
        uses: actions/cache@v4
        with:
          path: ~/.cache/huggingface
          key: huggingface-models-${{ runner.os }}
          restore-keys: huggingface-models-

      - name: 安装中文字体
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq fonts-wqy-microhei fonts-noto-cjk-extra 2>/dev/null || true
          fc-cache -fv 2>/dev/null || true
          echo "字体安装完成"
          fc-list :lang=zh | head -5 || echo "未检测到中文字体"

      - name: 安装依赖
        run: pip install -r requirements.txt

      - name: 配置环境变量
        run: |
          cp .env.example .env
          # === CI 环境使用官方 HuggingFace（非中国镜像）===
          echo "HF_ENDPOINT=https://huggingface.co" >> .env
          # === 深度分析模型（非敏感信息直接写入）===
          echo "AI_ANALYSIS_PROVIDER=deepseek" >> .env
          echo "AI_ANALYSIS_MODEL=deepseek-reasoner" >> .env
          echo "AI_ANALYSIS_KEY=${{ secrets.AI_ANALYSIS_KEY }}" >> .env
          echo "AI_ANALYSIS_BASE_URL=https://api.deepseek.com/v1" >> .env
          # === 快速筛选模型（非敏感信息直接写入）===
          echo "AI_FILTER_PROVIDER=doubao" >> .env
          echo "AI_FILTER_MODEL=doubao-seed-2-0-mini-260215" >> .env
          echo "AI_FILTER_KEY=${{ secrets.AI_FILTER_KEY }}" >> .env
          echo "AI_FILTER_BASE_URL=https://ark.cn-beijing.volces.com/api/v3" >> .env

      - name: 执行新闻采集
        run: python task1_collector.py
