# 新闻采集（每天2次补充）+ 早上采集+报告
# 触发时间使用 UTC，对应北京时间需 +8 小时
# 北京时间 07:00 = UTC 23:00 | 北京时间 15:00 = UTC 07:00 | 北京时间 23:00 = UTC 15:00
name: 新闻采集

on:
  schedule:
    - cron: '0 23 * * *'   # UTC 23:00 = 北京时间 07:00 - 采集+报告（主任务）
    - cron: '0 7 * * *'    # UTC 07:00 = 北京时间 15:00 - 补充采集
    - cron: '0 15 * * *'   # UTC 15:00 = 北京时间 23:00 - 补充采集
  workflow_dispatch:  # 支持手动触发

permissions:
  contents: write  # 报告归档需要 push 权限

jobs:
  # 北京时间 07:00（UTC 23:00）：采集 + 生成报告（主任务）
  # 手动触发时也执行此任务
  collect-and-report:
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' || github.event.schedule == '0 23 * * *'
    timeout-minutes: 240
    steps:
      - uses: actions/checkout@v4

      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 恢复 pip 缓存
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ runner.os }}-py311-${{ hashFiles('requirements.txt') }}
          restore-keys: pip-${{ runner.os }}-py311-

      - name: 恢复数据缓存
        uses: actions/cache@v4
        with:
          path: data
          key: news-analyzer-data-v1-${{ github.run_id }}
          restore-keys: news-analyzer-data-v1-
          save-always: true

      - name: 恢复 HuggingFace 模型缓存
        uses: actions/cache@v4
        with:
          path: ~/.cache/huggingface
          key: huggingface-models-${{ runner.os }}
          restore-keys: huggingface-models-

      - name: 安装中文字体
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq fonts-wqy-microhei fonts-noto-cjk-extra 2>/dev/null || true
          fc-cache -fv 2>/dev/null || true
          echo "字体安装完成"
          fc-list :lang=zh | head -5 || echo "未检测到中文字体"

      - name: 安装依赖
        run: pip install -r requirements.txt

      - name: 配置环境变量
        run: |
          cp .env.example .env
          # === CI 环境使用官方 HuggingFace（非中国镜像）===
          echo "HF_ENDPOINT=https://huggingface.co" >> .env
          # === 深度分析模型 ===
          echo "AI_ANALYSIS_PROVIDER=${{ secrets.AI_ANALYSIS_PROVIDER || 'deepseek' }}" >> .env
          echo "AI_ANALYSIS_MODEL=${{ secrets.AI_ANALYSIS_MODEL || 'deepseek-reasoner' }}" >> .env
          echo "AI_ANALYSIS_KEY=${{ secrets.AI_ANALYSIS_KEY }}" >> .env
          echo "AI_ANALYSIS_BASE_URL=${{ secrets.AI_ANALYSIS_BASE_URL || 'https://api.deepseek.com/v1' }}" >> .env
          # === 快速筛选模型 ===
          echo "AI_FILTER_PROVIDER=${{ secrets.AI_FILTER_PROVIDER || 'doubao' }}" >> .env
          echo "AI_FILTER_MODEL=${{ secrets.AI_FILTER_MODEL || 'doubao-seed-2-0-lite-260215' }}" >> .env
          echo "AI_FILTER_KEY=${{ secrets.AI_FILTER_KEY }}" >> .env
          echo "AI_FILTER_BASE_URL=${{ secrets.AI_FILTER_BASE_URL || 'https://ark.cn-beijing.volces.com/api/v3' }}" >> .env
          # === 备用模型（token 限额触发时自动切换）===
          echo "AI_BACKUP_PROVIDER=${{ secrets.AI_BACKUP_PROVIDER || '' }}" >> .env
          echo "AI_BACKUP_MODEL=${{ secrets.AI_BACKUP_MODEL || '' }}" >> .env
          echo "AI_BACKUP_KEY=${{ secrets.AI_BACKUP_KEY || '' }}" >> .env
          echo "AI_BACKUP_BASE_URL=${{ secrets.AI_BACKUP_BASE_URL || '' }}" >> .env
          # === Token 用量限额（按天）===
          echo "AI_TOKEN_LIMIT_DEFAULT=${{ secrets.AI_TOKEN_LIMIT_DEFAULT || '2000000' }}" >> .env
          echo "AI_TOKEN_THRESHOLD_DEFAULT=${{ secrets.AI_TOKEN_THRESHOLD_DEFAULT || '0.9' }}" >> .env
          # === 邮件配置 ===
          echo "SMTP_HOST=${{ secrets.SMTP_HOST }}" >> .env
          echo "SMTP_PORT=${{ secrets.SMTP_PORT }}" >> .env
          echo "SMTP_USER=${{ secrets.SMTP_USER }}" >> .env
          echo "SMTP_PASSWORD=${{ secrets.SMTP_PASSWORD }}" >> .env
          echo "EMAIL_TO=${{ secrets.EMAIL_TO }}" >> .env

      - name: 执行新闻采集
        id: collector_main
        run: python task1_collector.py

      - name: 缓存健康检查
        if: always()
        continue-on-error: true
        run: python scripts/cache_health_check.py

      - name: 生成报告并发送邮件
        run: python task2_reporter.py

      - name: 上传报告
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: daily-report
          path: reports/
          retention-days: 30

      - name: 提交报告到仓库归档
        if: success()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          REPORT_DATE=$(python -c "from datetime import date; print(date.today().isoformat())")
          mkdir -p reports/archive/${REPORT_DATE}
          cp reports/${REPORT_DATE}/depth/*.pdf reports/archive/${REPORT_DATE}/ 2>/dev/null || true
          cp reports/${REPORT_DATE}/brief/*.md reports/archive/${REPORT_DATE}/ 2>/dev/null || true
          git add reports/archive/
          git diff --staged --quiet || git commit -m "归档 ${REPORT_DATE} 新闻分析报告"
          git push

  # 北京时间 15:00、23:00（UTC 07:00、15:00）：补充采集
  collect:
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule' && (github.event.schedule == '0 7 * * *' || github.event.schedule == '0 15 * * *')
    timeout-minutes: 240
    steps:
      - uses: actions/checkout@v4

      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 恢复 pip 缓存
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ runner.os }}-py311-${{ hashFiles('requirements.txt') }}
          restore-keys: pip-${{ runner.os }}-py311-

      - name: 恢复数据缓存
        uses: actions/cache@v4
        with:
          path: data
          key: news-analyzer-data-v1-${{ github.run_id }}
          restore-keys: news-analyzer-data-v1-
          save-always: true

      - name: 恢复 HuggingFace 模型缓存
        uses: actions/cache@v4
        with:
          path: ~/.cache/huggingface
          key: huggingface-models-${{ runner.os }}
          restore-keys: huggingface-models-

      - name: 安装中文字体
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq fonts-wqy-microhei fonts-noto-cjk-extra 2>/dev/null || true
          fc-cache -fv 2>/dev/null || true
          echo "字体安装完成"
          fc-list :lang=zh | head -5 || echo "未检测到中文字体"

      - name: 安装依赖
        run: pip install -r requirements.txt

      - name: 配置环境变量
        run: |
          cp .env.example .env
          # === CI 环境使用官方 HuggingFace（非中国镜像）===
          echo "HF_ENDPOINT=https://huggingface.co" >> .env
          # === 深度分析模型 ===
          echo "AI_ANALYSIS_PROVIDER=${{ secrets.AI_ANALYSIS_PROVIDER || 'deepseek' }}" >> .env
          echo "AI_ANALYSIS_MODEL=${{ secrets.AI_ANALYSIS_MODEL || 'deepseek-reasoner' }}" >> .env
          echo "AI_ANALYSIS_KEY=${{ secrets.AI_ANALYSIS_KEY }}" >> .env
          echo "AI_ANALYSIS_BASE_URL=${{ secrets.AI_ANALYSIS_BASE_URL || 'https://api.deepseek.com/v1' }}" >> .env
          # === 快速筛选模型 ===
          echo "AI_FILTER_PROVIDER=${{ secrets.AI_FILTER_PROVIDER || 'doubao' }}" >> .env
          echo "AI_FILTER_MODEL=${{ secrets.AI_FILTER_MODEL || 'doubao-seed-2-0-lite-260215' }}" >> .env
          echo "AI_FILTER_KEY=${{ secrets.AI_FILTER_KEY }}" >> .env
          echo "AI_FILTER_BASE_URL=${{ secrets.AI_FILTER_BASE_URL || 'https://ark.cn-beijing.volces.com/api/v3' }}" >> .env
          # === 备用模型 ===
          echo "AI_BACKUP_PROVIDER=${{ secrets.AI_BACKUP_PROVIDER || '' }}" >> .env
          echo "AI_BACKUP_MODEL=${{ secrets.AI_BACKUP_MODEL || '' }}" >> .env
          echo "AI_BACKUP_KEY=${{ secrets.AI_BACKUP_KEY || '' }}" >> .env
          echo "AI_BACKUP_BASE_URL=${{ secrets.AI_BACKUP_BASE_URL || '' }}" >> .env
          # === Token 用量限额 ===
          echo "AI_TOKEN_LIMIT_DEFAULT=${{ secrets.AI_TOKEN_LIMIT_DEFAULT || '2000000' }}" >> .env
          echo "AI_TOKEN_THRESHOLD_DEFAULT=${{ secrets.AI_TOKEN_THRESHOLD_DEFAULT || '0.9' }}" >> .env

      - name: 执行新闻采集
        id: collector
        run: python task1_collector.py

      - name: 缓存健康检查
        if: always()
        continue-on-error: true
        run: python scripts/cache_health_check.py
